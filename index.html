<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>funnyangle</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <span class="logo" id="logo-btn">funnyangle</span>
    <div style="display:flex;align-items:center;gap:10px">
      <a href="settings.html" style="color:var(--text-secondary);font-size:1.2rem;text-decoration:none;min-height:44px;min-width:36px;display:flex;align-items:center;justify-content:center" title="Einstellungen">⚙️</a>
      <div id="user-controls"></div>
    </div>
  </header>

  <!-- Ladebildschirm -->
  <div id="loading-view" style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 52px)">
    <p style="color:var(--text-secondary)">Lade…</p>
  </div>

  <!-- Login-Ansicht -->
  <div id="login-view" style="display:none">
    <div class="login-screen">
      <h1>funnyangle</h1>
      <p>Die beste Stadtführung, die du je hattest — ohne Stadtführer.</p>
      <button class="btn btn-primary" id="login-btn">Mit Google anmelden</button>
      <p id="login-error" style="color:#ef4444;font-size:0.8rem;max-width:280px;line-height:1.5"></p>
    </div>
  </div>

  <!-- App-Ansicht (nach Login) -->
  <div id="app-view" style="display:none">
    <div id="map"></div>

    <div class="filter-bar" id="filter-bar"></div>

    <div class="station-list" id="station-list">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <p>Stationen werden geladen…</p>
      </div>
    </div>

    <!-- Bottom action bar -->
    <div class="bottom-bar hidden" id="bottom-bar">
      <button class="btn btn-ghost" id="clear-btn" style="padding:8px 10px;font-size:0.85rem;min-height:44px;min-width:44px;flex-shrink:0">×</button>
      <div class="bottom-info" style="flex:1;text-align:center">
        <strong id="tour-duration">–</strong>
        <span id="tour-count">0 Stationen</span>
      </div>
      <button class="btn btn-secondary" id="tour-panel-btn" style="padding:8px 12px;font-size:0.85rem;min-height:44px;flex-shrink:0">↑ Tour</button>
      <button class="btn btn-primary" id="start-tour-btn" style="padding:8px 14px;min-height:44px;flex-shrink:0">Start</button>
    </div>
  </div>

  <!-- Tour bottom sheet -->
  <div class="panel-backdrop" id="panel-backdrop"></div>
  <div class="tour-panel" id="tour-panel">
    <div class="tour-panel-handle"></div>
    <div class="tour-panel-header">
      <div>
        <div class="tour-panel-title">Meine Tour</div>
        <div class="tour-panel-meta" id="tour-panel-meta"></div>
      </div>
      <button class="tour-panel-close-btn" id="tour-panel-close">×</button>
    </div>
    <div class="tour-panel-list" id="tour-panel-list"></div>
    <div class="tour-panel-actions">
      <button class="btn btn-secondary" id="share-btn" style="flex:1">Teilen</button>
      <button class="btn btn-primary" id="start-tour-btn2" style="flex:1">Tour starten</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { initApp, state } from './js/app.js';
    import { signInWithGoogle, signOutUser } from './js/firebase.js';
    import { initMap, renderPins, getTagColor, refreshPin, refreshAllPins, renderPolyline, fitToSelected } from './js/map.js';
    import { getVisited, saveSelectedTour, getPrefs } from './js/sync.js';
    import { optimizeRoute } from './js/tour.js';

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(console.error);
    }

    const FILTERS = [
      { id: 'alle',          label: 'Alle',          cls: 'chip-alle' },
      { id: 'punk',          label: 'Punk',          cls: 'chip-punk' },
      { id: 'musik',         label: 'Musik',         cls: 'chip-musik' },
      { id: 'psychedelisch', label: 'Psychedelisch', cls: 'chip-psychedelisch' },
      { id: 'weird',         label: 'Weird',         cls: 'chip-weird' },
      { id: 'architektur',   label: 'Architektur',   cls: 'chip-architektur' },
      { id: 'pause',         label: 'Pause',         cls: 'chip-pause' },
      { id: 'geschichte',    label: 'Geschichte',    cls: 'chip-geschichte' }
    ];

    let activeFilter = 'alle';
    let mapReady = false;

    // ── Auth ──

    document.getElementById('login-btn').addEventListener('click', () => {
      signInWithGoogle().catch(err => {
        document.getElementById('login-error').textContent = err.message;
      });
    });

    document.getElementById('logo-btn').addEventListener('click', () => {
      if (confirm('Auswahl zurücksetzen und zur Startansicht?')) {
        clearSelection();
        activeFilter = 'alle';
        renderFilterBar();
        renderStationList();
        renderPins(getFilteredStations(), station => toggleStation(station.id));
      }
    });

    initApp({
      onLoggedIn: (user) => {
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('app-view').style.display = '';
        renderUserControls(user);

        if (!mapReady) { initMap(); mapReady = true; }

        // Handle shared tour URL param
        const params = new URLSearchParams(location.search);
        const tourParam = params.get('tour');
        if (tourParam) {
          const ids = tourParam.split(',').filter(id => state.stations.find(s => s.id === id));
          if (ids.length) {
            state.selectedStations = ids;
            saveSelectedTour(ids);
          }
          history.replaceState({}, '', location.pathname);
        }

        renderFilterBar();
        renderStationList();
        renderPins(getFilteredStations(), station => toggleStation(station.id));

        if (state.selectedStations.length) {
          renderPolyline();
          fitToSelected();
          updateBottomBar();
        }
      },
      onLoggedOut: () => {
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('login-view').style.display = '';
        document.getElementById('app-view').style.display = 'none';
        document.getElementById('user-controls').innerHTML = '';
      }
    });

    // ── User controls ──

    function renderUserControls(user) {
      const el = document.getElementById('user-controls');
      if (user.photoURL) {
        el.innerHTML = `<img class="user-avatar" src="${user.photoURL}" alt="${user.displayName}" id="sign-out-btn" title="Abmelden">`;
      } else {
        const initial = (user.displayName || '?')[0].toUpperCase();
        el.innerHTML = `<div class="user-emoji" id="sign-out-btn" title="Abmelden">${initial}</div>`;
      }
      document.getElementById('sign-out-btn').addEventListener('click', () => {
        if (confirm('Abmelden?')) signOutUser();
      });
    }

    // ── Filters + station list ──

    function getFilteredStations() {
      if (activeFilter === 'alle') return state.stations;
      return state.stations.filter(s => s.tags && s.tags.includes(activeFilter));
    }

    function renderFilterBar() {
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = FILTERS.map(f =>
        `<button class="chip ${f.cls}${activeFilter === f.id ? ' active' : ''}" data-filter="${f.id}">${f.label}</button>`
      ).join('');
      bar.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          activeFilter = chip.dataset.filter;
          renderFilterBar();
          renderStationList();
          renderPins(getFilteredStations(), station => toggleStation(station.id));
        });
      });
    }

    function renderStationList() {
      const container = document.getElementById('station-list');
      const visited = getVisited();
      const filtered = getFilteredStations().slice().sort((a, b) => (a.order || 0) - (b.order || 0));

      if (!filtered.length) {
        container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>Keine Stationen für diesen Filter.</p></div>`;
        return;
      }

      container.innerHTML = filtered.map(station => {
        const isSelected = state.selectedStations.includes(station.id);
        const isVisited = visited.includes(station.id);
        const tourNum = isSelected ? state.selectedStations.indexOf(station.id) + 1 : '';
        const checkMark = isSelected ? tourNum : (isVisited ? '✓' : '');
        const firstTag = station.tags?.[0] || '';
        const tagColor = getTagColor(firstTag);
        return `<div class="station-item${isSelected ? ' selected' : ''}${isVisited ? ' visited' : ''}" data-id="${station.id}">
          <div class="station-checkbox">${checkMark}</div>
          <div class="station-info">
            <div class="station-name">${station.name}</div>
            <div class="station-meta">
              ${firstTag ? `<span class="tag-badge" style="color:${tagColor};border-color:${tagColor}">${firstTag}</span>` : ''}
              <span>${station.duration_minutes} Min</span>
              ${station.type === 'venue' ? '<span>🏠</span>' : ''}
            </div>
          </div>
          <a href="station.html?id=${station.id}" class="btn btn-ghost" style="padding:8px 12px;font-size:0.8rem;min-height:36px" onclick="event.stopPropagation()">Info</a>
        </div>`;
      }).join('');

      container.querySelectorAll('.station-item').forEach(item => {
        item.addEventListener('click', () => toggleStation(item.dataset.id));
      });
    }

    // ── Tour selection + optimization ──

    function toggleStation(stationId) {
      const idx = state.selectedStations.indexOf(stationId);
      if (idx === -1) {
        state.selectedStations.push(stationId);
        state.selectedStations = optimizeRoute(state.selectedStations);
      } else {
        state.selectedStations.splice(idx, 1);
        if (state.selectedStations.length >= 3) {
          state.selectedStations = optimizeRoute(state.selectedStations);
        }
      }
      saveSelectedTour(state.selectedStations);
      renderStationList();
      refreshPin(stationId);
      // Refresh all selected pin numbers (order may have changed)
      state.selectedStations.forEach(id => { if (id !== stationId) refreshPin(id); });
      renderPolyline();
      if (state.selectedStations.length) fitToSelected();
      updateBottomBar();
      if (tourPanelOpen) renderTourPanel();
    }

    function clearSelection() {
      state.selectedStations = [];
      saveSelectedTour([]);
      renderStationList();
      renderPins(getFilteredStations(), station => toggleStation(station.id));
      renderPolyline();
      updateBottomBar();
      closeTourPanel();
    }

    // ── Bottom bar ──

    function updateBottomBar() {
      const bar = document.getElementById('bottom-bar');
      if (!state.selectedStations.length) {
        bar.classList.add('hidden');
        return;
      }
      bar.classList.remove('hidden');
      const selected = state.stations.filter(s => state.selectedStations.includes(s.id));
      const totalMin = selected.reduce((sum, s) => sum + (s.duration_minutes || 0), 0);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      document.getElementById('tour-duration').textContent = h > 0 ? `ca. ${h}h ${m}min` : `ca. ${m} Min`;
      document.getElementById('tour-count').textContent = `${selected.length} Station${selected.length !== 1 ? 'en' : ''}`;
    }

    document.getElementById('clear-btn').addEventListener('click', clearSelection);

    document.getElementById('start-tour-btn').addEventListener('click', () => {
      if (!state.selectedStations.length) return;
      saveSelectedTour(state.selectedStations);
      window.location.href = 'tour.html';
    });

    // ── Tour bottom sheet panel ──

    let tourPanelOpen = false;

    function openTourPanel() {
      renderTourPanel();
      document.getElementById('tour-panel').classList.add('open');
      document.getElementById('panel-backdrop').classList.add('open');
      tourPanelOpen = true;
    }

    function closeTourPanel() {
      document.getElementById('tour-panel').classList.remove('open');
      document.getElementById('panel-backdrop').classList.remove('open');
      tourPanelOpen = false;
    }

    function renderTourPanel() {
      const stations = state.selectedStations
        .map(id => state.stations.find(s => s.id === id))
        .filter(Boolean);

      const totalMin = stations.reduce((sum, s) => sum + (s.duration_minutes || 0), 0);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      const durationStr = h > 0 ? `ca. ${h}h ${m}min` : `ca. ${m} Min`;

      document.getElementById('tour-panel-meta').textContent =
        `${stations.length} Station${stations.length !== 1 ? 'en' : ''} · ${durationStr}`;

      const list = document.getElementById('tour-panel-list');
      list.innerHTML = stations.map((s, i) => {
        const firstTag = s.tags?.[0] || '';
        return `<div class="tour-panel-item" data-id="${s.id}">
          <div class="tour-panel-num">${i + 1}</div>
          <div style="flex:1;min-width:0">
            <div class="tour-panel-name">${s.name}</div>
            <div class="tour-panel-sub">${s.duration_minutes} Min${firstTag ? ' · ' + firstTag : ''}</div>
          </div>
          <div class="tour-move-btns">
            <button class="tour-move-btn" data-dir="up" data-idx="${i}" ${i === 0 ? 'disabled' : ''}>↑</button>
            <button class="tour-move-btn" data-dir="down" data-idx="${i}" ${i === stations.length - 1 ? 'disabled' : ''}>↓</button>
          </div>
          <a href="station.html?id=${s.id}" class="btn btn-ghost" style="padding:6px 10px;font-size:0.85rem;min-height:36px;flex-shrink:0">→</a>
        </div>`;
      }).join('');

      list.querySelectorAll('.tour-move-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const idx = parseInt(btn.dataset.idx);
          const dir = btn.dataset.dir;
          const swapIdx = dir === 'up' ? idx - 1 : idx + 1;
          if (swapIdx < 0 || swapIdx >= state.selectedStations.length) return;
          [state.selectedStations[idx], state.selectedStations[swapIdx]] =
            [state.selectedStations[swapIdx], state.selectedStations[idx]];
          saveSelectedTour(state.selectedStations);
          renderStationList();
          refreshAllPins();
          renderPolyline();
          renderTourPanel();
        });
      });
    }

    document.getElementById('tour-panel-btn').addEventListener('click', () => {
      if (state.selectedStations.length) openTourPanel();
    });

    document.getElementById('tour-panel-close').addEventListener('click', closeTourPanel);
    document.getElementById('panel-backdrop').addEventListener('click', closeTourPanel);

    document.getElementById('start-tour-btn2').addEventListener('click', () => {
      saveSelectedTour(state.selectedStations);
      window.location.href = 'tour.html';
    });

    // ── Tour sharing ──

    document.getElementById('share-btn').addEventListener('click', shareTour);

    function shareTour() {
      if (!state.selectedStations.length) return;
      const ids = state.selectedStations.join(',');
      const url = `${location.origin}${location.pathname}?tour=${ids}`;
      if (navigator.share) {
        navigator.share({ title: 'Meine funnyangle Tour', url }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => showToast('Link kopiert!')).catch(() => {
          prompt('Tour-Link kopieren:', url);
        });
      }
    }

    // ── Toast ──

    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('visible');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('visible'), 2400);
    }
  </script>
</body>
</html>
