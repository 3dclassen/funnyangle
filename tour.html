<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Meine Tour — funnyangle</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="back-btn">← Karte</a>
    <span style="font-size:0.85rem;color:var(--text-secondary)" id="tour-header">Tour</span>
  </header>

  <div class="progress-bar-wrap" id="progress-wrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0 von 0 abgehakt</div>
  </div>

  <div class="tour-list" id="tour-list">
    <div class="empty-state" style="min-height:60vh">
      <div class="icon">⏳</div>
      <p>Wird geladen…</p>
    </div>
  </div>

  <script type="module">
    import { initApp, state } from './js/app.js';
    import { getVisited, getSelectedTour } from './js/sync.js';
    import { getTagColor } from './js/tour.js';

    initApp({
      onLoggedIn: () => renderTour(),
      onLoggedOut: () => window.location.replace('index.html')
    });

    function renderTour() {
      const selectedIds = getSelectedTour();

      if (!selectedIds.length) {
        document.getElementById('tour-list').innerHTML = `
          <div class="empty-state" style="min-height:60vh">
            <div class="icon">🗺</div>
            <p>Keine Stationen ausgewählt.<br><a href="index.html">Zur Karte</a></p>
          </div>`;
        return;
      }

      const stations = selectedIds
        .map(id => state.stations.find(s => s.id === id))
        .filter(Boolean);

      const visited = getVisited();
      const visitedCount = stations.filter(s => visited.includes(s.id)).length;
      const pct = stations.length ? Math.round(visitedCount / stations.length * 100) : 0;

      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = `${visitedCount} von ${stations.length} abgehakt`;
      document.getElementById('tour-header').textContent = `Tour (${visitedCount}/${stations.length})`;

      const totalMin = stations.reduce((sum, s) => sum + (s.duration_minutes || 0), 0);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      const timeStr = h > 0 ? `${h}h ${m}min` : `${m} Min`;

      document.getElementById('tour-list').innerHTML = `
        <div style="padding:12px 16px 4px;font-size:0.8rem;color:var(--text-secondary)">
          ${stations.length} Stationen · ca. ${timeStr}
        </div>
        ${stations.map((station, i) => {
          const isDone = visited.includes(station.id);
          const firstTag = station.tags?.[0] || '';
          const color = getTagColor(firstTag);
          return `<div class="tour-station${isDone ? ' done' : ''}">
            <div class="tour-step-num">${isDone ? '✓' : i + 1}</div>
            <div style="flex:1;min-width:0">
              <div class="tour-station-name">${station.name}</div>
              <div class="tour-station-meta">
                ${firstTag ? `<span class="tag-badge" style="color:${color};border-color:${color};font-size:0.65rem">${firstTag}</span>` : ''}
                ${station.duration_minutes} Min
              </div>
            </div>
            <a href="station.html?id=${station.id}" class="btn btn-ghost" style="padding:8px 12px;font-size:0.8rem;min-height:36px">
              ${isDone ? '✓' : 'Detail'}
            </a>
          </div>`;
        }).join('')}
        ${visitedCount === stations.length && stations.length > 0
          ? `<div style="padding:32px 16px;text-align:center">
               <div style="font-size:2.5rem">🏆</div>
               <h2 style="margin-top:12px">Tour abgeschlossen!</h2>
               <p style="color:var(--text-secondary);margin-top:8px;font-size:0.9rem">
                 Auf ein Bier im Feldstern — du hast es verdient.
               </p>
             </div>`
          : ''}`;
    }
  </script>
</body>
</html>
